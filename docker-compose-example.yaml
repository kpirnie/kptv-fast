services:
  kptv_fast:
    # image: ghcr.io/kpirnie/kptv_fast:latest
    image: ghcr.io/kpirnie/kptv_fast:dev
    container_name: kptv_fast
    hostname: kptv_fast
    ports:
      - 8080:8080
    environment: 

      # Server configuration
      - CACHE_DURATION=7200 # 2 hours

      # Startup cache warming
      - WARM_CACHE_ON_STARTUP=true    # Enable startup cache warming
      - STARTUP_CACHE_DELAY=10        # Wait 10s before warming cache
      - WARM_EPG_ON_STARTUP=true      # Also warm EPG cache (slower)
      
      # Performance
      - MAX_WORKERS=5           # Concurrent provider fetches (default: 5)
      - PROVIDER_TIMEOUT=60     # Per-provider timeout in seconds (default: 60)
      - PYTHONUNBUFFERED=1

      # Provider configuration: 
        # all or comma-separated from:
        # xumo,tubi,pluto,plex,samsung,
        # lg,distrotv,stirr,git_freetv,git_iptv,
        # vizio,roku,localnow,tcl,tclplus,firetv,
        # xiaomi,philo,tablo,whale
      - ENABLED_PROVIDERS=all
      
      # Provider Specific Config
      - PLUTO_USERNAME=
      - PLUTO_PASSWORD=
      - PHILO_SESSION_ID=
      - PHILO_HASHED_SESSION_ID=

      # Regional settings
      - PLUTO_REGION=us_east
      - PLEX_REGION=local
      - SAMSUNG_REGION=us
      - GIT_COUNTRY=us,ca,uk,canada,usa
      - LG_COUNTRY=us,ca,gb
      - WHALE_COUNTRY=us         # Comma-separated ISO country codes for Whale TV+
      - WHALE_LANG=en            # Language code for Whale TV+ metadata

      # Filtering (regex patterns)
      - CHANNEL_NAME_INCLUDE=
      - CHANNEL_NAME_EXCLUDE=
      - GROUP_INCLUDE=
      - GROUP_EXCLUDE=

      # Debug logging
      - DEBUG=false
      
    # keep it running unless the container is stopped
    restart: unless-stopped

    # healthcheck
    healthcheck:
      test: ["CMD", "curl", "-v", "http://127.0.0.1:8080/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s